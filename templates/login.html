<!-- FILE: templates/login.html -->
{% extends 'base.html' %}
{% block title %}Sign In - Medisoft Portal{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="p-4 bg-medisoft text-white text-center">
                <i class="fa-solid fa-shield-halved fa-3x mb-2 text-info"></i>
                <h4 class="fw-bold mb-0">Login</h4>
                <small class="text-white-50">Authorized Healthcare Operations Only</small>
            </div>
            <div class="card-body p-4 bg-white">
                <form action="/login/" method="POST" autocomplete="off">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold"><i class="fa-solid fa-user me-1 text-secondary"></i> Account Username</label>
                        <input type="text" name="username" class="form-control py-2 shadow-sm" placeholder="Enter username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold"><i class="fa-solid fa-lock me-1 text-secondary"></i> Password</label>
                        <input type="password" name="password" class="form-control py-2 shadow-sm" placeholder="Enter your password" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label text-muted small" for="rememberMe">Maintain token lock</label>
                        </div>
                        <a href="#" class="text-decoration-none small text-medisoft">Recover credential</a>
                    </div>
                    <button type="submit" class="btn btn-medisoft w-100 py-2 fw-bold text-uppercase shadow-sm">
                        Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                    </button>
                </form>
            </div>
            <div class="card-footer py-3 text-center bg-light border-0">
                <p class="mb-0 text-muted small">New system node? <a href="/register/" class="text-decoration-none fw-bold text-medisoft">Register Node Environment</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
